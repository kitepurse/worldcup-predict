name: 世界杯比分预测

on:
  schedule:
    # 北京时间每天 17:50 (UTC 09:50)
    - cron: '50 9 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行世界杯预测
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python3 run.py

      - name: 上传预测存档
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worldcup-predictions
          path: data/predictions/
          retention-days: 90

      - name: 上传报告存档
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worldcup-reports
          path: data/report_*.html
          retention-days: 90
